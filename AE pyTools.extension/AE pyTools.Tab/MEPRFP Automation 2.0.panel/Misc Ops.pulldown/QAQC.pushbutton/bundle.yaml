title: QAQC
tooltip: |
  Audit profile / placement health across six categories: orphan
  profiles, missing parents, far-from-parent, ID discrepancies, parent
  type changes, and host-name mismatches. Merged-into-another profiles
  are not reported as orphans, known aliases don't trigger parent-type
  changes, and trailing ' : Default' decoration is ignored on host-name
  comparisons. Per-row Select / Zoom / Fix buttons act on the doc
  directly; Refresh re-audits in place.
is_beta: false
