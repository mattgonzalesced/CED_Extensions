title:
  en_us: "Rename Circuits by Device Parameter"
tooltip:
  en_us: >-
    Version = 1.2

    Date    = 02.27.2026
    ________________________________________________________________
    Description:

    Uses the current selection to find connected circuits. For each
    detected circuit, choose up to three text parameters from connected
    selected devices:
      - Prefix
      - Name
      - Suffix
    The resulting circuit name is Prefix + Name + Suffix.

    Notes:
      - Works from selected devices (or selected circuits).
      - "No Change" is available for Prefix, Name, and Suffix.
      - "Apply to all" controls are available for Prefix, Name, and Suffix.
      - If Name is "No Change", the existing circuit name is used.
      - If selected devices on the same circuit have multiple values for
        a chosen parameter, that circuit is skipped.
    ________________________________________________________________

author: Reed Pinterich - CoolSys (2026)
