title: "Create\nIndependent\nProfile"
tooltip: |
  Capture selected elements as a new independent equipment definition in the active YAML.
  The profile stores offsets, parameters, tags, and annotation data from your current selection.
  This is useful when you need a standalone placement recipe that does not depend on parent grouping.
  The new definition is saved to Extensible Storage and becomes available for placement workflows.
is_beta: false
