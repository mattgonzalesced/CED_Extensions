title: "Run All\nProximity Checks"
tooltip: |
  Runs all configured proximity/clearance checks in the AI_QC group:
    - Lights vs CED-R-KRACK coils
    - Lights vs sprinklers
    - Sprinkler obstruction clearance
    - Equipment access clearance
    - Duct clearance (mechanical)
    - Conduit vs pipe (electrical)
    - Pipe clearance (plumbing)
    - Refrigeration coils proximity
  Shows a full report for each check and a summary table of pass/fail and hit counts.
is_beta: false

