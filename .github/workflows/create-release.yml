name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1. Read toolbar_version from about.yaml, create the v{version} tag if missing.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      msi_version: ${{ steps.version.outputs.msi_version }}
      tag: ${{ steps.tagcheck.outputs.tag }}
      tag_exists: ${{ steps.tagcheck.outputs.exists }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Read version
        id: version
        run: |
          FILE="AE pyTools.extension/AE pyTools.Tab/CED Tools.panel/About.pushbutton/about.yaml"
          VERSION=$(grep 'toolbar_version:' "$FILE" | awk '{print $2}')
          # MSI ProductVersion needs 4 fields. 4th field = workflow run number for uniqueness.
          MSI_VERSION="${VERSION}.${{ github.run_number }}"
          echo "version=$VERSION"      >> $GITHUB_OUTPUT
          echo "msi_version=$MSI_VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Toolbar version: $VERSION | MSI version: $MSI_VERSION"

      - name: Fetch tags
        run: git fetch --tags

      - name: Check tag status
        id: tagcheck
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::warning::Tag already exists: $TAG (release will be updated, MSI asset overwritten)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Tag does not exist. Will create."
          fi

      - name: Create tag
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          TAG="${{ steps.tagcheck.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "::notice::Tag created: $TAG"

  # 2. Build the MSI on Windows using the version from job 1.
  build-msi:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add WiX 3.14 to PATH
        shell: pwsh
        run: |
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI
        shell: pwsh
        run: ./msi/build_msi.ps1 -Version "${{ needs.prepare.outputs.msi_version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Updater_pyrevit-${{ needs.prepare.outputs.tag }}
          path: ./msi/output/Updater_pyrevit.msi
          if-no-files-found: error

  # 3. Create / update the GitHub release with auto-generated notes and the MSI attached.
  release:
    needs: [prepare, build-msi]
    runs-on: ubuntu-latest
    steps:
      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: Updater_pyrevit-${{ needs.prepare.outputs.tag }}
          path: ./artifact

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: AE pyTools ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: ./artifact/Updater_pyrevit.msi
          fail_on_unmatched_files: true

      - name: Final status
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          echo "::notice::Release published for $TAG with MSI asset attached."
          echo "::notice::Stable latest URL: https://github.com/${{ github.repository }}/releases/latest/download/Updater_pyrevit.msi"
