name: Sync Main Back To Develop

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: sync-main-back-to-develop
  cancel-in-progress: true

jobs:
  sync-main-back:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop' && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        run: |
          set -euo pipefail

          git fetch origin main develop
          git checkout develop
          git merge --no-ff origin/main -m "Bot: sync main back to develop"
          git push origin HEAD:develop
