name: Build MSI

on:
  push:
    branches: [main]
    paths:
      - '**.extension/**'
      - '**.lib/**'
      - 'CED_pyTelemetry/**'
      - 'msi/**'
      - '.github/workflows/build-msi.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add WiX Toolset to PATH
        shell: pwsh
        run: |
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Compute version
        shell: pwsh
        run: |
          $now = Get-Date
          # MSI compares first 3 fields only; 4th field gives unique release tag
          $version = "$($now.Year - 2000).$($now.Month).$($now.Day).${{ github.run_number }}"
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building version: $version"

      - name: Build MSI
        shell: pwsh
        run: ./msi/build_msi.ps1 -Version $env:BUILD_VERSION

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Updater_pyrevit-${{ env.BUILD_VERSION }}
          path: ./msi/output/Updater_pyrevit.msi
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          name: CED pyRevit Extensions v${{ env.BUILD_VERSION }}
          body: |
            Auto-built MSI for CED pyRevit Extensions.

            **Install location:** `%APPDATA%\pyRevit\Extensions`
            **Deploy via:** Intune (user context), SCCM, or manual install

            Stable "latest" URL:
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/Updater_pyrevit.msi
            ```
          files: ./msi/output/Updater_pyrevit.msi
          fail_on_unmatched_files: true
