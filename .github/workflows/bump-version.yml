name: Bump Toolbar Version

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    branches:
      - main

jobs:
  bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    if: >
      contains(toJson(github.event.pull_request.labels.*.name), 'release: major') ||
      contains(toJson(github.event.pull_request.labels.*.name), 'release: minor') ||
      contains(toJson(github.event.pull_request.labels.*.name), 'release: patch')

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Skip if already bumped
        run: |
          if git log --grep="Auto bump toolbar_version" -n 1; then
            echo "Already bumped in this PR. Skipping."
            exit 0
          fi

      - name: Run version bump script
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: python .github/scripts/bump_version.py

      - name: Commit and push changes
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Auto bump toolbar_version"
          git push