name: Bump Toolbar Version

on:
  pull_request:
    types: [labeled]
    branches:
      - main

jobs:
  bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # ONLY run when a release label is ADDED
    if: >
      github.event.label.name == 'release: major' ||
      github.event.label.name == 'release: minor' ||
      github.event.label.name == 'release: patch'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version
        env:
          PR_LABELS: ${{ github.event.label.name }}
        run: python .github/scripts/bump_version.py

      - name: Commit and push changes
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Auto bump toolbar_version"
          git push